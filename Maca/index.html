<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gossip Girl Blog - Manhattan's Elite</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css" />
</head>

<body onload="cargarPersonajesLocales()">

  <header class="gossip-header">
    <div class="header-container">
      <h1 class="logo">GOSSIP GIRL</h1>
      <p class="tagline">Your one and only source into the scandalous lives of Manhattan's elite.</p>
      <div class="alert-banner">
        <span class="live-dot"></span> ALERTA DE CHISME EN VIVO
      </div>
    </div>
  </header>

  <main class="main-content">
    <section class="search-section">
      <h3 class="search-title">¿A QUIÉN QUERÉS ESPIAR?</h3>
      <div class="search-box">
        <input 
          type="number" 
          id="idObjetivo" 
          placeholder="ID de la víctima (1 a 60)" 
          min="1" 
          max="60"
        />
        <button onclick="buscarObjetivoLocal()">Rastrear</button>
        <button onclick="cargarPersonajesLocales()" class="btn-reset">Mostrar Todo el Elenco</button>
      </div>
    </section>

    <div id="ConteinerCard" class="gossip-grid">
      </div>
  </main>

  <footer class="gossip-footer">
    <p>¿Tenés un chisme de último momento? Envianos un correo cifrado.</p>
    <h5 class="xoxo">You know you love me. XOXO, Gossip Girl.</h5>
  </footer>

  <script src="main.js"></script>
</body>
</html>
